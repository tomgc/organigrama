# Workflow para desplegar contenido estático en GitHub Pages
name: Deploy static content to Pages

on:
  # Se ejecuta en cada push a la rama principal
  push:
    branches: ["main"]

  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos del GITHUB_TOKEN para desplegar a GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un único despliegue concurrente, sin cancelar el que esté en curso
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el repositorio
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
